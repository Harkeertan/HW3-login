<form id="loginForm">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button type="submit">Login</button>
  <div id="error"></div>
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const pwd = document.getElementById('password').value;
  if (!email || !pwd) {
    document.getElementById('error').innerText = 'There should be no empty fields';
  } else if (!email.includes('@')) {
    document.getElementById('error').innerText = 'email is invalid';
  } else if (pwd.length < 8) {
    document.getElementById('error').innerText = 'password has to be at least 8 charecters';
  } else {
  }
});
</script>
